<div class="auth-container">
  <div class="card">
    <h2>Login</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label for="usernameOrEmail">Username or Email</label>
      <input id="usernameOrEmail" type="text" formControlName="usernameOrEmail" />

      <small *ngIf="form.get('usernameOrEmail')?.touched && form.get('usernameOrEmail')?.invalid">
        Username or email is required
      </small>

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />

      <small *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
        Password must be at least 6 characters
      </small>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="btn btn-signup" routerLink="/signup">Sign up -></button>
  </div>
</div>
